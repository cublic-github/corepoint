<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CorePoint - Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            base: { 50: '#f7f8f8', 100: '#edeef1', 200: '#d8dbe1', 300: '#b5bac5', 400: '#8d94a3', 500: '#6e7788', 600: '#5a616f', 700: '#494e5a', 800: '#3f434d', 900: '#1a1c22', 950: '#111216' },
            accent: { DEFAULT: '#0d9488', light: '#14b8a6', dark: '#0f766e', glow: 'rgba(13,148,136,0.15)' },
            warm: { DEFAULT: '#d97706', light: '#f59e0b', soft: '#fef3c7' },
          },
          fontFamily: { sans: ['"Fira Sans"', '"Noto Sans JP"', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    .choice-card { transition: all 0.2s ease; }
    .choice-card:hover { transform: translateY(-1px); border-color: #0d9488; background: rgba(13,148,136,0.05); }
    .choice-card.selected { border-color: #0d9488; background: rgba(13,148,136,0.08); box-shadow: 0 0 0 1px #0d9488; }
    .choice-card.selected .choice-label { background: #0d9488; color: #fff; }
    .progress-fill { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    #thanks-page { display: none; }
    #thanks-page.active { display: flex; }
    #quiz-page.hidden { display: none; }
  </style>
</head>
<body class="bg-base-50 text-base-900 min-h-screen flex flex-col">

  <!-- ヘッダー -->
  <header class="border-b border-base-200 bg-white/80 backdrop-blur-sm">
    <div class="max-w-2xl mx-auto px-6 flex items-center h-14">
      <div class="flex items-center gap-2.5">
        <div class="w-7 h-7 bg-accent rounded flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m-7.071-2.929l.707-.707m12.728 0l.707.707M3 12h1m16 0h1m-2.929-7.071l-.707.707M6.636 6.636l-.707-.707"/></svg>
        </div>
        <span class="font-semibold text-base-800 tracking-tight">CorePoint</span>
      </div>
    </div>
  </header>

  <!-- クイズ画面 -->
  <div id="quiz-page" class="flex-1">
    <div class="max-w-2xl mx-auto px-6 py-10">

      <!-- プログレス -->
      <div class="mb-10">
        <div class="flex justify-between text-sm text-base-500 mb-2.5">
          <span>Question <span id="current-q" class="font-medium text-base-700">1</span> / <span id="total-q">5</span></span>
          <span id="progress-pct" class="font-medium text-base-700">20%</span>
        </div>
        <div class="w-full h-1 bg-base-200 rounded-full overflow-hidden">
          <div id="progress-bar" class="progress-fill h-full bg-accent rounded-full" style="width: 20%"></div>
        </div>
      </div>

      <!-- 設問カード -->
      <div class="fade-in mb-8">
        <p class="text-sm text-base-400 mb-1.5 tracking-wide uppercase font-medium">Q1 - ことばの語源</p>
        <h2 class="text-xl font-semibold leading-relaxed text-base-900" id="question-text">
          「タメ口」の語源は何だと思う？
        </h2>
      </div>

      <!-- 選択肢 -->
      <div class="space-y-3" id="choices">
        <button class="choice-card w-full text-left bg-white border border-base-200 rounded-xl p-5 flex items-start gap-4 cursor-pointer" onclick="selectChoice(this, 0)">
          <span class="choice-label shrink-0 w-8 h-8 rounded-lg bg-base-100 flex items-center justify-center text-sm font-semibold text-base-500 transition-colors">A</span>
          <p class="font-medium text-base-800">「博打用語の『同目（どうめ）』が由来だよ」</p>
        </button>

        <button class="choice-card w-full text-left bg-white border border-base-200 rounded-xl p-5 flex items-start gap-4 cursor-pointer" onclick="selectChoice(this, 1)">
          <span class="choice-label shrink-0 w-8 h-8 rounded-lg bg-base-100 flex items-center justify-center text-sm font-semibold text-base-500 transition-colors">B</span>
          <p class="font-medium text-base-800">「同い年という意味だよ」</p>
        </button>

        <button class="choice-card w-full text-left bg-white border border-base-200 rounded-xl p-5 flex items-start gap-4 cursor-pointer" onclick="selectChoice(this, 2)">
          <span class="choice-label shrink-0 w-8 h-8 rounded-lg bg-base-100 flex items-center justify-center text-sm font-semibold text-base-500 transition-colors">C</span>
          <p class="font-medium text-base-800">「見た目が一緒だから『見た目』の略だよ w」</p>
        </button>

        <button class="choice-card w-full text-left bg-white border border-base-200 rounded-xl p-5 flex items-start gap-4 cursor-pointer" onclick="selectChoice(this, 3)">
          <span class="choice-label shrink-0 w-8 h-8 rounded-lg bg-base-100 flex items-center justify-center text-sm font-semibold text-base-500 transition-colors">D</span>
          <p class="font-medium text-base-800">「織田裕二が為末に言った『タメー！』のこと」</p>
        </button>

        <button class="choice-card w-full text-left bg-white border border-base-200 rounded-xl p-5 flex items-start gap-4 cursor-pointer" onclick="selectChoice(this, 4)">
          <span class="choice-label shrink-0 w-8 h-8 rounded-lg bg-base-100 flex items-center justify-center text-sm font-semibold text-base-500 transition-colors">E</span>
          <p class="font-medium text-base-800">「ターメリックの味が年齢で変わるから」</p>
        </button>
      </div>

      <!-- 次へ -->
      <div class="mt-8 flex justify-end">
        <button id="next-btn" onclick="nextQuestion()" class="bg-accent hover:bg-accent-dark text-white px-7 py-2.5 rounded-lg font-medium text-sm transition-colors disabled:opacity-30 disabled:cursor-not-allowed" disabled>
          次の質問へ
        </button>
      </div>
    </div>
  </div>

  <!-- サンクス画面 -->
  <div id="thanks-page" class="flex-1 items-center justify-center">
    <div class="text-center px-6 fade-in">
      <div class="w-16 h-16 bg-accent/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h1 class="text-2xl font-semibold text-base-900 mb-3">回答ありがとうございました</h1>
      <p class="text-base-500 max-w-sm mx-auto leading-relaxed">
        ご回答は正常に送信されました。<br>結果は担当者より別途ご連絡いたします。
      </p>
      <div class="mt-8 pt-8 border-t border-base-200">
        <p class="text-sm text-base-400">このページは閉じていただいて問題ありません。</p>
      </div>
    </div>
  </div>

  <script>
    let selectedIdx = -1;
    function selectChoice(el, idx) {
      selectedIdx = idx;
      document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('next-btn').disabled = false;
    }
    function nextQuestion() {
      // モック: サンクス画面へ遷移
      document.getElementById('quiz-page').classList.add('hidden');
      document.getElementById('thanks-page').classList.add('active');
    }
  </script>
</body>
</html>
